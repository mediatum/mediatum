<div style="position:absolute;left:-20px;top:5px;" tal:content="python:lang + ': '">TEXT</div>
<tal:block metal:define-macro="editorfield">
    <input type="text" tal:attributes="name python:u'mediatum-editor-nodefield-value-{}-text'.format(name); value python:value; required required; pattern pattern"/>
</tal:block>

<input metal:define-macro="searchfield" tal:attributes="name python:name; id python:name; value python:value" type="text" class="searchfield"/>

<tal:block metal:define-macro="metafieldeditor">
    <label>
        <tal:block i18n:translate="fieldtype_text_pattern"/>
        <input type="text" name="fieldsetting_pattern" tal:attributes="value pattern"/>
    </label>
</tal:block>
