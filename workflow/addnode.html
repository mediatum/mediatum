<metal:block metal:define-macro="workflow_step_type_config">
    <label>
        <tal:block i18n:translate="addnode-node-id-attribute"/>
        <input type="text" name="stepsetting_node-id-attribute" tal:attributes="value node-id-attribute"/>
    </label>
    <label>
        <tal:block i18n:translate="addnode-replace-assignment"/>
        <input type="checkbox" name="stepsetting_replace_assignment" tal:attributes="checked python:'checked' if replace_assignment else None" value="1"/>
    </label>
    <label>
        <tal:block i18n:translate="copy-metafield-attribute"/>
        <input type="text" name="stepsetting_copy-metafield-attribute" tal:attributes="value copy-metafield-attribute"/>
    </label>
</metal:block>
